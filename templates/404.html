{% extends "base.html" %}

{% block title %}404 - Napak Wheels{% endblock %}

{% block content %}
<div class="notfound-wrap">
    <div class="notfound-card text-center">
        <div class="notfound-icon mb-3">
            <i class="fas fa-car-side"></i>
        </div>
        <h1 class="notfound-code">404</h1>
        <h3 class="notfound-title mb-2">Page not found</h3>
        <p class="text-secondary mb-4">Looks like your car took the wrong turn. Let’s get you back on the road.</p>

        <div class="d-flex flex-column flex-sm-row gap-2 justify-content-center">
            <a href="{{ url_for('main.index') }}" class="btn btn-dark btn-lg">
                <i class="fas fa-route me-2"></i>Back to Browse Cars
            </a>
            <a href="{{ url_for('main.add_car') }}" class="btn btn-outline-secondary btn-lg">
                <i class="fas fa-plus me-2"></i>Sell Your Car
            </a>
        </div>
    </div>
</div>
{% endblock %}
